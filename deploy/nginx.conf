server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Long cache for fingerprinted assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
