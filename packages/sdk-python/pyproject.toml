[project]
name = "quokka-tracker"
version = "0.1.0"
description = "Python SDK for Quokka — self-hosted experiment tracker."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
readme = "README.md"
dependencies = ["requests>=2.31"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["quokka"]
